<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Harmony Checker｜Atelier Composition Son</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f2eb;
      color: #1f1f1f;
      margin: 0;
      padding: 40px 20px;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border: 1px solid #ddd5c7;
      border-radius: 18px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.04);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    p {
      line-height: 1.8;
    }

    input {
      margin-top: 16px;
      margin-bottom: 16px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      background: #1f1f1f;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .result-item {
      border-top: 1px solid #e6ded2;
      padding: 14px 0;
    }

    .rule {
      font-weight: 700;
    }

    .meta {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .error {
      color: #9b1c1c;
    }
  </style>
</head>

<body>
  <main>
    <section class="card">
      <h1>Harmony Checker</h1>
      <p>
        MusicXMLファイルをアップロードすると、四声体和声の基本的な禁則を確認できます。
        現在は、連続5度・連続8度・隠伏5度・隠伏8度・声部交差・声域・声部間隔・大きすぎる跳躍に対応しています。
      </p>
      <p>
        このツールは補助的な確認用です。音楽的な判断や例外処理はレッスン内で確認します。初回アクセス時は解析に少し時間がかかる場合があります。
      </p>

      <input type="file" id="fileInput" accept=".xml,.musicxml,.mxl" />
      <br />
      <button id="analyzeButton">解析する</button>
    </section>

    <section class="card">
      <h2>解析結果</h2>
      <div id="status">ファイルを選択してください。</div>
      <div id="results"></div>
    </section>
  </main>

  <script>
    // RenderやVercelにデプロイした後、このURLを差し替えます。
    const API_URL = "https://harmony-checker-backend.onrender.com/analyze";
    
    const fileInput = document.getElementById("fileInput");
    const analyzeButton = document.getElementById("analyzeButton");
    const statusDiv = document.getElementById("status");
    const resultsDiv = document.getElementById("results");

    analyzeButton.addEventListener("click", async () => {
      const file = fileInput.files[0];

      if (!file) {
        statusDiv.textContent = "MusicXMLファイルを選択してください。";
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      analyzeButton.disabled = true;
      statusDiv.textContent = "解析中です...";
      resultsDiv.innerHTML = "";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (!data.ok) {
          statusDiv.innerHTML = `<span class="error">解析エラー：${data.error}</span>`;
          return;
        }

        if (data.count === 0) {
          statusDiv.textContent = "禁則は検出されませんでした。";
          return;
        }

        statusDiv.textContent = `${data.count} 件の指摘が見つかりました。`;

        data.results.forEach((item) => {
          const div = document.createElement("div");
          div.className = "result-item";

          const measureText =
            item.measure !== undefined
              ? `小節 ${item.measure}`
              : `小節 ${item.measure_before} → ${item.measure_after}`;

          div.innerHTML = `
            <div class="rule">${item.rule}</div>
            <div>${item.message}</div>
            <div class="meta">${measureText}</div>
          `;

          resultsDiv.appendChild(div);
        });

      } catch (error) {
        statusDiv.innerHTML = `<span class="error">通信エラー：APIに接続できません。</span>`;
        console.error(error);
      } finally {
        analyzeButton.disabled = false;
      }
    });
  </script>
</body>
</html>
